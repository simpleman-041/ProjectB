<!--拾得物検索画面-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>忘れ物詳細ページ</title>

<style>
body{
    margin:0;
    background:#d9d9d9;
    font-family:sans-serif;
}

.page{
    width:100%;
    min-height:100vh;
    box-sizing:border-box;
}

.header{
    width:500px;
    height:150px;
    background:#5a95d4;
    border:2px solid #333;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
    font-size:42px;
    font-weight:bold;

}

.content{
    width:92%;
    margin:10px auto 50px;
    display:flex;
    gap:20px;
}

.left-panel,
.right-panel{
    flex:1;
    background:#d0d0d0;
    border:2px solid #222;
    padding:30px;
    box-sizing:border-box;
    min-height:500px;
}

.form-row{
    display:flex;
    align-items:center;
    margin-bottom:35px;
}

.form-row label{
    width:140px;
    font-size:30px;
    font-weight:bold;
}

.form-row input{
    flex:1;
    height:45px;
    border:2px solid #222;
    border-radius:8px;
    background:#eeeeee;
    font-size:22px;
    padding:0 10px;
    box-sizing:border-box;
}

.reserve-area{
    margin-top:40px;
    text-align:right;
}

.reserve-button{
    width:130px;
    height:60px;
    border:2px solid #222;
    border-radius:10px;
    background:#5a95d4;
    font-size:28px;
    cursor:pointer;
}

.footer{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    height:40px;
    background:#5a95d4;
    border-top:2px solid #222;
    color:white;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:24px;
    box-sizing:border-box;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="page">

    <div class="header">
        詳細ページ
    </div>

    <div class="content">

        <!-- 左側 -->
        <div class="left-panel">

            <div class="form-row">
                <label>名称</label>
                <input type="text" value="">
            </div>

            <div class="form-row">
                <label>色</label>
                <input type="text" value="">
            </div>

            <div class="form-row">
                <label>特徴</label>
                <input type="text" value="">
            </div>

            <div class="form-row">
                <label>拾得日時</label>
                <input type="text" value="">
            </div>

            <div class="form-row">
                <label>拾得場所</label>
                <input type="text" value="">
            </div>

            <div class="form-row">
                <label>拾得物ID</label>
                <input type="text" value="自動割り当て" readonly>
            </div>

        </div>

        <!-- 右側 -->
        <div class="right-panel">

            <div class="form-row">
                <label>日時</label>
                <input type="datetime-local">
            </div>

            <div class="form-row">
                <label>氏名</label>
                <input type="text">
            </div>

            <div class="reserve-area">
                <button class="reserve-button">
                    予約
                </button>
            </div>

        </div>

    </div>

</div>

<footer class="footer">
    文教大学　情報学部　情報システム学科　プロジェクト演習B
</footer>

</body>
</html>
