<!--ユーザ登録画面-->
<!--担当：岩上楓季-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>拾得物情報記入ページ</title>

<style>
body{
    margin:0;
    background:#e5e5e5;
    font-family:sans-serif;
}

.header{
    width:500px;
    height:150px;
    background:#4f8fd1;
    border:2px solid #222;
    color:white;
    font-size:40px;
    font-weight:bold;
    display:flex;
    align-items:center;
    padding-left:40px;
    box-sizing:border-box;
}

.form-area{
    width:90%;
    margin:10px auto;
    background:#d3d3d3;
    border:2px solid #222;
    border-radius:70px;
    padding:60px;
    box-sizing:border-box;
    min-height:700px;
}

.form-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:60px 120px;
}

.form-item{
    display:flex;
    align-items:center;
}

label{
    width:140px;
    font-size:28px;
    font-weight:bold;
}

input{
    width:360px;
    height:50px;
    border:3px solid #203746;
    border-radius:10px;
    font-size:22px;
    padding-left:10px;
    box-sizing:border-box;
}

/* 保存ボタン */
.button-area{
    text-align:right;
    margin-top:80px;
}

.save-btn{
    width:180px;
    height:80px;
    background:#4f8fd1;
    color:white;
    border:2px solid #222;
    border-radius:18px;
    font-size:28px;
    cursor:pointer;
}

.footer{
    width:100%;
    height:40px;
    background:#4f8fd1;
    border-top:2px solid #222;
    color:white;
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding-right:20px;
    box-sizing:border-box;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="header">
    拾得物情報記入ページ
</div>

<div class="form-area">

    <form>

        <div class="form-grid">

            <div class="form-item">
                <label>名称</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>氏名</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>色</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>電話番号</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>特徴</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>メールアドレス</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>拾得日時</label>
                <input type="text">
            </div>

            <div class="form-item">
                <label>拾得物ID</label>
                <input type="text" value="自動割り当て" readonly>
            </div>

            <div class="form-item">
                <label>拾得場所</label>
                <input type="text">
            </div>

        </div>

        <div class="button-area">
            <button class="save-btn" type="submit">保存</button>
        </div>

    </form>

</div>

<footer class="footer">
    文教大学　情報学部　情報システム学科　プロジェクト演習B
</footer>

</body>
</html>
