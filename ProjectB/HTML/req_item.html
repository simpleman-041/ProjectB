<!--遺失物捜索依頼記入画面-->
<!--担当：谷畑湊斗-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>忘れ物検索結果</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic",sans-serif;
    background:#f0f0f0;
}

/* 上部検索エリア */
.header{
    background:#4d95d9;
    margin:30px;
    border-radius:25px;
    padding:25px 40px;
    color:white;
}

.header h1{
    margin:0 0 20px 0;
    font-size:50px;
    font-weight:normal;
}

.search-area{
    display:flex;
    gap:20px;
}

.search-box{
    flex:1;
    height:55px;
    border-radius:12px;
    border:2px solid #000;
    font-size:24px;
    padding-left:15px;
}

.search-btn{
    width:140px;
    border:none;
    border-radius:12px;
    background:#d9d9d9;
    font-size:30px;
    cursor:pointer;
}

/* 検索結果 */
.result-area{
    margin:30px;
    background:#d9d9d9;
    border:2px solid #777;
    padding:20px;
}

.item{
    display:flex;
    align-items:center;
    margin-bottom:35px;
}

.item-info{
    flex:1;
    background:white;
    border:2px solid #000;
    border-radius:12px;
    padding:15px;
    font-size:28px;
}

.detail-btn{
    margin-left:20px;
    width:140px;
    height:65px;
    border:none;
    border-radius:12px;
    background:#4d95d9;
    color:white;
    font-size:28px;
    cursor:pointer;
}

.footer{
    background:#4d95d9;
    color:white;
    text-align:center;
    padding:15px;
    font-size:18px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- ①検索エリア -->
<div class="header">
    <h1>忘れ物検索結果</h1>

    <div class="search-area">
        <input type="text" class="search-box" placeholder="検索キーワードを入力">
        <button class="search-btn">🔍 検索</button>
    </div>
</div>

<!-- ②検索結果一覧 -->
<div class="result-area">

    <div class="item">
        <div class="item-info">
            名称：財布　　拾得物ID：0001
        </div>
        <button class="detail-btn">詳細</button>
    </div>

    <div class="item">
        <div class="item-info">
            名称：傘　　拾得物ID：0002
        </div>
        <button class="detail-btn">詳細</button>
    </div>

    <div class="item">
        <div class="item-info">
            名称：スマホ　　拾得物ID：0003
        </div>
        <button class="detail-btn">詳細</button>
    </div>

    <div class="item">
        <div class="item-info">
            名称：学生証　　拾得物ID：0004
        </div>
        <button class="detail-btn">詳細</button>
    </div>

    <div class="item">
        <div class="item-info">
            名称：イヤホン　　拾得物ID：0005
        </div>
        <button class="detail-btn">詳細</button>
    </div>

</div>

<div class="footer">
    文教大学　情報学部　情報システム学科　プロジェクト演習B
</div>

</body>
</html>
